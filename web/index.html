<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="suki">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="preload" href="assets/loading.woff2" as="font" type="font/woff2" crossorigin>

  <title>suki</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --page-bg: #f3eff5;
      --card-bg: #ffffff;
      --title-color: #ff5daf;
      --title-color-soft: #ff8cc3;
      --divider-color: #efd7e2;
      --text-color: #7a7188;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      --card-border: rgba(255, 93, 175, 0.12);
      --card-width: min(86vw, 360px);
      --card-max-width: 360px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg: #17131b;
        --card-bg: #231c29;
        --title-color: #ff8cc3;
        --title-color-soft: #ffb1d3;
        --divider-color: #4a3850;
        --text-color: #ccbfd6;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
        --card-border: rgba(255, 140, 195, 0.16);
      }
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--page-bg);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(255, 93, 175, 0.08), transparent 45%), var(--page-bg);
      opacity: 1;
      transition: opacity 0.5s ease;
      z-index: 9999;
    }

    #loading-screen.is-hiding {
      opacity: 0;
      pointer-events: none;
    }

    .loading-card {
      width: var(--card-width);
      max-width: var(--card-max-width);
      border-radius: 28px;
      padding: 28px 24px 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
    }

    .loading-title {
      display: inline-flex;
      align-items: baseline;
      gap: 0;
      color: var(--title-color);
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1;
      margin-bottom: 18px;
    }

    .loading-word {
      font-family: "LoadingOnly", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 1em;
      letter-spacing: 0.12em;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      display: inline-flex;
      align-items: baseline;
      gap: 0.12em;
    }

    .loading-char {
      display: inline-block;
      animation: charJump 1.25s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .loading-char:nth-child(1) { animation-delay: 0s; }
    .loading-char:nth-child(2) { animation-delay: 0.1s; }
    .loading-char:nth-child(3) { animation-delay: 0.2s; }
    .loading-char:nth-child(4) { animation-delay: 0.3s; }
    .loading-char:nth-child(5) { animation-delay: 0.4s; }
    .loading-char:nth-child(6) { animation-delay: 0.5s; }
    .loading-char:nth-child(7) { animation-delay: 0.6s; }
    .loading-char:nth-child(8) { animation-delay: 0.7s; }
    .loading-char:nth-child(9) { animation-delay: 0.8s; }
    .loading-char:nth-child(10) { animation-delay: 0.9s; }

    .loading-char.dot {
      font-size: 1.05em;
      letter-spacing: 0;
    }

    .loading-divider {
      height: 1px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--divider-color), transparent);
      margin: 0 0 18px;
    }

    .tip-wrap {
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tip-text {
      color: var(--text-color);
      font-size: 15px;
      line-height: 1.7;
      letter-spacing: 0.01em;
      transition: opacity 0.35s ease, transform 0.35s ease;
      max-width: 100%;
      white-space: pre-line;
    }

    .tip-text.is-fading {
      opacity: 0;
      transform: translateY(6px);
    }

    @keyframes charJump {
      0%, 70%, 100% {
        transform: translateY(0);
        color: var(--title-color);
      }
      35% {
        transform: translateY(-8px) scale(1.04);
        color: var(--title-color-soft);
      }
    }

    @media (max-width: 420px) {
      :root {
        --card-width: min(92vw, 420px);
        --card-max-width: 420px;
      }

      .loading-card {
        padding: 30px 22px 24px;
        border-radius: 26px;
      }

      .loading-title {
        font-size: 24px;
        margin-bottom: 16px;
      }

      .loading-divider {
        margin-bottom: 16px;
      }

      .tip-wrap {
        min-height: 96px;
      }

      .tip-text {
        font-size: 15px;
        line-height: 1.7;
      }
    }

    @media (max-width: 360px) {
      :root {
        --card-width: min(94vw, 380px);
        --card-max-width: 380px;
      }

      .loading-card {
        padding: 28px 18px 22px;
      }

      .loading-title {
        font-size: 22px;
      }

      .tip-text {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
    <div id="loading-screen" aria-live="polite" aria-busy="true">
      <div class="loading-card">
        <div class="loading-title">
          <span class="loading-word" aria-label="loading..." role="img">
            <span class="loading-char">L</span>
            <span class="loading-char">O</span>
            <span class="loading-char">A</span>
            <span class="loading-char">D</span>
            <span class="loading-char">I</span>
            <span class="loading-char">N</span>
            <span class="loading-char">G</span>
            <span class="loading-char dot">.</span>
            <span class="loading-char dot">.</span>
            <span class="loading-char dot">.</span>
          </span>
        </div>
        <div class="loading-divider" aria-hidden="true"></div>
        <div class="tip-wrap">
        <div class="tip-text" id="loading-tip"></div>
      </div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function () {
      if ('FontFace' in window && document.fonts) {
        var fontFace = new FontFace(
          'LoadingOnly',
          'url(assets/loading.woff2) format("woff2")',
          { display: 'swap', weight: '700', style: 'normal' }
        );

        fontFace.load().then(function (loadedFont) {
          document.fonts.add(loadedFont);
        }).catch(function () {
          // Keep the fallback system font if the subset font fails to load.
        });
      }

      const loadingScreen = document.getElementById('loading-screen');
      const tipText = document.getElementById('loading-tip');
      const tips = [
        '🎀 你可以预约指定女仆的服务时间段',
        '🌸 排班页面可以查看所有女仆的排班计划',
        '🎀 预约成功后可以在我的页面查看记录',
        '🌸 支持携带好友一同前往',
        '🎀 数据已缓存，离线也可查看排班',
        '🌸 单击底栏可以回到最顶上，双击顶栏可以刷新'
      ];

      let tipIndex = 0;
      let tipTimer = null;
      let hideTimer = null;
      let observer = null;
      let hidden = false;

      function setTip(nextIndex) {
        if (!tipText) {
          return;
        }
        tipText.classList.add('is-fading');
        window.setTimeout(function () {
          tipIndex = nextIndex;
          tipText.textContent = tips[tipIndex];
          tipText.classList.remove('is-fading');
        }, 220);
      }

      function startTipRotation() {
        if (tipTimer) {
          return;
        }
        tipText.textContent = tips[0];
        tipTimer = window.setInterval(function () {
          setTip((tipIndex + 1) % tips.length);
        }, 4000);
      }

      function stopTipRotation() {
        if (tipTimer) {
          window.clearInterval(tipTimer);
          tipTimer = null;
        }
      }

      function hideLoading() {
        if (hidden || !loadingScreen) {
          return;
        }
        hidden = true;
        stopTipRotation();
        loadingScreen.classList.add('is-hiding');
        if (hideTimer) {
          window.clearTimeout(hideTimer);
        }
        hideTimer = window.setTimeout(function () {
          loadingScreen.style.display = 'none';
          if (observer) {
            observer.disconnect();
            observer = null;
          }
        }, 520);
      }

      function hasFlutterView() {
        return Boolean(document.querySelector('flt-glass-pane'));
      }

      function checkFlutterReady() {
        if (hasFlutterView()) {
          hideLoading();
        }
      }

      startTipRotation();
      checkFlutterReady();

      observer = new MutationObserver(function () {
        checkFlutterReady();
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });

      window.addEventListener('load', function () {
        checkFlutterReady();
      });
    })();
  </script>
</body>
</html>
